name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  core:
    name: Core Type And Build Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run core CI
        run: npm run ci:core

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run account company save-flow smoke
        run: npm run smoke:e2e:account-company:run

      - name: Run account company save-flow report
        run: npm run smoke:e2e:account-company:report:run

      - name: Verify account company save-flow report
        run: npm run smoke:e2e:account-company:report:verify

      - name: Upload account company save-flow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-company-save-flow-report
          path: test-results/account-company-save-flow/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run account products save-flow report
        run: npm run smoke:e2e:account-products:report:run

      - name: Verify account products save-flow report
        run: npm run smoke:e2e:account-products:report:verify

      - name: Upload account products save-flow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-products-save-flow-report
          path: test-results/account-products-save-flow/
          if-no-files-found: ignore
          retention-days: 7

      - name: Download account company save-flow report
        uses: actions/download-artifact@v4
        with:
          name: account-company-save-flow-report
          path: test-results/downloaded/account-company-save-flow

      - name: Verify downloaded account company save-flow report
        run: node scripts/check-report-artifacts.mjs account-company-save-flow test-results/downloaded/account-company-save-flow

      - name: Download account products save-flow report
        uses: actions/download-artifact@v4
        with:
          name: account-products-save-flow-report
          path: test-results/downloaded/account-products-save-flow

      - name: Verify downloaded account products save-flow report
        run: node scripts/check-report-artifacts.mjs account-products-save-flow test-results/downloaded/account-products-save-flow

      - name: Verify downloaded account report suite
        run: |
          mkdir -p test-results/account-report-summary
          npm run account:reports:verify-suite -- \
            --company-root test-results/downloaded/account-company-save-flow \
            --products-root test-results/downloaded/account-products-save-flow \
            --summary-output test-results/account-report-summary/verification.md

      - name: Write account report summary
        run: |
          mkdir -p test-results/account-report-summary
          node scripts/summarize-report-artifacts.mjs \
            --company-root test-results/downloaded/account-company-save-flow \
            --products-root test-results/downloaded/account-products-save-flow \
            --output test-results/account-report-summary/summary.md
          cat test-results/account-report-summary/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment account report summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- yorso-account-report-artifacts -->'
          summary_file='test-results/account-report-summary/summary.md'
          body_file='test-results/account-report-summary/pr-comment.md'
          printf "%s\n\n" "$marker" > "$body_file"
          cat "$summary_file" >> "$body_file"
          existing_comment_id="$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | contains("<!-- yorso-account-report-artifacts -->")) | .id' | tail -n 1)"
          if [ -n "$existing_comment_id" ]; then
            gh api graphql \
              -f query='mutation($id:ID!, $body:String!) { updateIssueComment(input:{id:$id, body:$body}) { issueComment { id } } }' \
              -f id="$existing_comment_id" \
              -F body=@"$body_file"
          else
            gh pr comment "$PR_NUMBER" --body-file "$body_file"
          fi

      - name: Upload account report summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-report-summary
          path: test-results/account-report-summary/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run browser smoke tests
        run: npm run smoke:e2e:run

      - name: Run API-backed access browser suite
        run: npm run smoke:e2e:api-backed-access-flows

      - name: Run frontend without Supabase env smoke
        run: npm run smoke:e2e:frontend-no-supabase-env

      - name: Run self-hosted auth frontend smoke
        run: npm run smoke:e2e:self-hosted-auth-frontend

      - name: Run admin runtime status browser smoke
        run: npm run smoke:e2e:admin-runtime-status

      - name: Run admin access review browser smoke
        run: npm run smoke:e2e:admin-access-review

      - name: Run admin access grants browser smoke
        run: npm run smoke:e2e:admin-access-grants

      - name: Run admin operations browser smoke
        run: npm run smoke:e2e:admin-operations

      - name: Run admin audit events browser smoke
        run: npm run smoke:e2e:admin-audit-events

      - name: Run admin incidents browser smoke
        run: npm run smoke:e2e:admin-incidents

      - name: Run admin incident detail browser smoke
        run: npm run smoke:e2e:admin-incident-detail

      - name: Run self-hosted access runtime browser smoke
        run: npm run smoke:e2e:self-hosted-access-runtime

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
