name: yorso-self-hosted

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      YORSO_API_HOST: 0.0.0.0
      YORSO_API_PORT: 3000
      ACCOUNT_REPOSITORY: postgres
      YORSO_PUBLIC_APP_URL: ${YORSO_PUBLIC_APP_URL:-http://localhost:8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-yorso_app}:${POSTGRES_PASSWORD:-change-me-local-only}@pgbouncer:5432/${POSTGRES_DB:-yorso}
      REDIS_URL: redis://redis:6379
      AUTH_RATE_LIMIT_DRIVER: redis
      AUTH_RATE_LIMIT_FAIL_MODE: closed
      AUTH_SIGN_IN_FAILURE_WINDOW_MS: ${AUTH_SIGN_IN_FAILURE_WINDOW_MS:-900000}
      AUTH_SIGN_IN_MAX_FAILED_ATTEMPTS: ${AUTH_SIGN_IN_MAX_FAILED_ATTEMPTS:-5}
      AUTH_RATE_LIMIT_KEY_PREFIX: ${AUTH_RATE_LIMIT_KEY_PREFIX:-yorso:auth}
      AUTH_SESSION_CACHE_DRIVER: redis
      AUTH_SESSION_CACHE_FAIL_MODE: closed
      AUTH_SESSION_CACHE_TTL_MS: ${AUTH_SESSION_CACHE_TTL_MS:-300000}
      AUTH_SESSION_CACHE_KEY_PREFIX: ${AUTH_SESSION_CACHE_KEY_PREFIX:-yorso:auth}
      AUTH_OBSERVABILITY_DRIVER: console
      YORSO_ERROR_OBSERVABILITY_DRIVER: console
      YORSO_METRICS_DRIVER: prometheus
      YORSO_REQUEST_OBSERVABILITY_DRIVER: console
      HEALTH_READINESS_TIMEOUT_MS: ${HEALTH_READINESS_TIMEOUT_MS:-750}
      YORSO_REQUEST_TIMEOUT_MS: ${YORSO_REQUEST_TIMEOUT_MS:-15000}
      YORSO_REQUEST_BODY_IDLE_TIMEOUT_MS: ${YORSO_REQUEST_BODY_IDLE_TIMEOUT_MS:-5000}
      YORSO_HEADERS_TIMEOUT_MS: ${YORSO_HEADERS_TIMEOUT_MS:-16000}
      YORSO_KEEP_ALIVE_TIMEOUT_MS: ${YORSO_KEEP_ALIVE_TIMEOUT_MS:-5000}
      YORSO_MAX_HEADER_BYTES: ${YORSO_MAX_HEADER_BYTES:-16384}
      YORSO_JSON_BODY_MAX_BYTES: ${YORSO_JSON_BODY_MAX_BYTES:-65536}
      YORSO_SHUTDOWN_DRAIN_DELAY_MS: ${YORSO_SHUTDOWN_DRAIN_DELAY_MS:-5000}
      YORSO_SHUTDOWN_GRACE_TIMEOUT_MS: ${YORSO_SHUTDOWN_GRACE_TIMEOUT_MS:-30000}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-yorso-local}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_ROOT: /var/lib/yorso/uploads
      YORSO_MAX_UPLOAD_BYTES: ${YORSO_MAX_UPLOAD_BYTES:-8388608}
      YORSO_SESSION_SECRET: ${YORSO_SESSION_SECRET:-change-me-32-bytes-minimum}
      YORSO_JWT_SECRET: ${YORSO_JWT_SECRET:-change-me-32-bytes-minimum}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${YORSO_API_PORT:-3000}:3000"
    stop_grace_period: 40s
    volumes:
      - yorso-api-uploads:/var/lib/yorso/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yorso}
      POSTGRES_USER: ${POSTGRES_USER:-yorso_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - yorso-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yorso_app} -d ${POSTGRES_DB:-yorso}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.24.1-p1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-yorso_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      DB_NAME: ${POSTGRES_DB:-yorso}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - yorso-redis-data:/data

  minio:
    image: minio/minio:RELEASE.2026-04-30T18-30-56Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-change-me-local-only}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-change-me-local-only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - yorso-minio-data:/data

volumes:
  yorso-api-uploads:
  yorso-postgres-data:
  yorso-redis-data:
  yorso-minio-data:
